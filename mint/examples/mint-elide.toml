# Example mint configuration — the Elide role inventory subset from
# docs/design-mint.md § "Elide as customer: role inventory".

audience = "mint"

# Operator auth integration (docs/design-auth-service.md). Required: the
# discharge URL (path included) for the enroll gate (invite), the exchange
# gate (ticket), and the admin gate (cli-token), each keyed by K_M-A which
# the auth integration provides. Production runs a separate auth-service
# binary (no [demo_auth]); the operator admin plane authenticates against
# that service, not a colocated UDS.
auth_location = "https://auth.elide.internal/v1/discharge"

# data_dir / roles_dir: a relative value (including the defaults
# mint_data / mint_roles) resolves against the working directory, not
# this file's parent; an absolute path is used verbatim. roles_dir is
# set here so the example runs from the mint/ crate directory:
roles_dir = "examples/elide_roles"
# data_dir = "mint_data"
#
# Each role's policy template is <roles_dir>/<name>.json by default
# (so volume-ro -> examples/elide_roles/volume-ro.json); set an explicit
# policy_file on a role only to override that name.

# Listener transport (docs/design-mint.md § "Transport"). `bind` and
# `socket` are mutually exclusive. The bundled single-host dev shape
# (coordinator + mint co-resident) uses the UDS listener:
socket = "mint_data/mint.sock"
# For a TCP listener instead, replace the line above with:
#   bind = "127.0.0.1:8085"

[store]
bucket = "elide-demo"
# endpoint = "https://t3.storage.dev"   # default; set for non-Tigris S3
# region   = "us-east-1"                # default

# Surfaced to role policy templates as `{{env.X}}` (flat scalars only).
# The elide roles grant on `{{env.bucket}}`; here it is the same bucket
# that holds `_mint/*`, but the two are configured independently.
[env]
bucket = "elide-demo"

[[role]]
name = "volume-ro"
required_caveats = ["elide:Volume", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 3600         # 1h
default_ttl_seconds = 3600

[[role]]
name = "volume-rw"
required_caveats = ["sub", "elide:Volume", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 86400        # 24h
default_ttl_seconds = 86400

[[role]]
name = "coord-ro"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 3600         # 1h
default_ttl_seconds = 3600

[[role]]
name = "coord-rw"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 3600         # 1h
default_ttl_seconds = 3600
