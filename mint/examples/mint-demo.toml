# Minimal demo config (docs/design-mint.md § "Reference client & demo").
#
# Two roles — `read` / `write` over a single {{request.prefix}}. `read`
# exercises plain issuance (invite → enroll → approve → exchange →
# assume-role); `write` adds the operator-authorisation loop — it carries
# a third-party caveat, so assume-role is refused until the client fetches
# a discharge from [auth] and attaches it. This is NOT the Elide role
# inventory (see mint-elide.toml for that).
# Each role's policy template lives under roles_dir (examples/demo_roles/).
#
# `mint serve` always talks to a real S3-compatible backend (Tigris,
# MinIO, AWS). Set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in the
# environment before starting, and point `tenant.bucket` at a bucket
# you own.

audience = "mint"
# data_dir defaults to mint_data, roles_dir to mint_roles, each resolved
# against the working directory (not this file's parent); an absolute
# path is used verbatim. roles_dir is set so the demo runs from mint/:
roles_dir = "examples/demo_roles"
# data_dir = "mint_data"
# Each role's template defaults to <roles_dir>/<name>.json (read ->
# examples/demo_roles/read.json); set policy_file only to override.

# Listener transport (docs/design-mint.md § "Transport"). `bind` and
# `socket` are mutually exclusive. The bundled single-host dev shape
# (coordinator + mint co-resident) uses the UDS listener:
socket = "mint_data/mint.sock"        # client: --url unix:mint_data/mint.sock
# For a TCP listener instead, replace the line above with:
#   bind = "127.0.0.1:8085"           # client: --url http://127.0.0.1:8085

[tenant]
bucket = "mint-demo"

# Colocate the auth-service role so this single mint process closes the
# operator-authorisation loop end-to-end (no separate auth binary). With
# demo_enabled, mint binds a second UDS for /v1/discharge, generates its
# own K_M-A / K_session, and rubber-stamps every discharge request.
# endpoint is the location stamped on every third-party caveat — the
# address the client posts a CID to; it points back at this same socket.
[auth]
endpoint = "unix:mint_data/auth.sock"
demo_enabled = true

[[role]]
name = "read"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 3600
default_ttl_seconds = 900

# issues_with_tpc binds a third-party caveat into the issued credential:
# assume-role refuses it until the client fetches and attaches a
# discharge from [auth].endpoint.
[[role]]
name = "write"
required_caveats = ["sub", "aud", "exp"]
min_ttl_seconds = 60
max_ttl_seconds = 900
default_ttl_seconds = 300
issues_with_tpc = true
