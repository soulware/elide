# Elide coordinator on Fly.io — the runtime config the image runs, paired with
# fly.toml.example (the deploy config). The coordinator self-issues its operator
# discharges at `elide coord enroll` from the K_M-A it shares with mint
# ([auth.demo].k_m_a below, identical to deploy/mint/mint-fly.toml's) — no auth
# round-trip, no bridge. Demo-tier: a known, forgeable key
# (docs/design-auth-service.md § "Proposed: distributed demo — shared K_M-A").
#
# Set [store].bucket and [mint].url for your deployment.

data_dir = "/data/elide_data"

[store]
# The Tigris data bucket the mint roles are scoped to (= mint's DATA_BUCKET).
bucket = "elide"
endpoint = "https://t3.storage.dev"
region = "auto"

[mint]
# The mint Fly app's 6PN plane.
url = "http://mint-for-elide.internal:8085"

[auth.demo]
# K_M-A shared with mint — identical to deploy/mint/mint-fly.toml.
k_m_a = "XXdf8FWWdPwfx2RePVaoQzxA7zLjbC+zEnkAWiVA/2M="
