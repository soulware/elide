# mint-for-elide config for the Fly.io deployment (see README.md § Fly.io
# deployment). Self-contained: mint-elide.toml plus the Fly data_dir, listener,
# colocated demo auth, and the shared attestation key. The role + profile
# catalog is the shared catalog.toml.

audience = "mint"

# Rendered roles/ (mint render output), resolved against mint's working dir.
roles_dir = "roles"

# The [[role]] + [[profile]] catalog, resolved against mint's working dir.
catalog_file = "catalog.toml"

# Keyring, sealed surface, invite nonce, and demo secrets — the Fly volume.
data_dir = "/data/mint_data"

# Private 6PN listener (all interfaces).
bind = "[::]:8085"

[auth]
# Auth-service identity stamped into the enroll/exchange/admin gates.
location = "https://auth.elide.internal/v1/discharge"

[attestation]
# Attestation authority (the dedicated attest instance) identity for the
# attested volume roles; the holder fetches the discharge from here.
location = "http://elide-attest.internal:8087/v1/discharge"
# K_M-B, the shared attestation-CID wrapping key — the identical value the
# attest instance holds. Demo-tier: standard base64 of 32 bytes, known and
# forgeable.
k_m_b = "8K0oyDybI3jBHjtUYxtrfLKHeniWHK8JmxxpCS/e3IU="

[store]
# mint's own administrative bucket (holds its _mint/* state). The Fly build
# overrides this from the DATA_BUCKET / STORE_BUCKET build arg.
bucket = "mint-admin"

# Colocated demo auth issuer, binding a container-internal UDS. `k_m_a` is a
# demo-tier shared-key secret — standard base64 of 32 bytes, known and
# forgeable — identical to the coordinator's value (docs/design/auth-service.md).
[auth.demo]
socket = "/data/mint_data/auth.sock"
k_m_a = "XXdf8FWWdPwfx2RePVaoQzxA7zLjbC+zEnkAWiVA/2M="
