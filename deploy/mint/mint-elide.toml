# Elide's mint configuration: the operational surface the stock mint binary is
# sealed with to serve an Elide deployment (`mint serve --config
# mint-elide.toml`; see README.md). The role + profile catalog lives in
# `catalog.toml`; the keys marked PER-DEPLOYMENT below are filled in per site.

audience = "mint"

# roles_dir / data_dir: a relative value resolves against mint's working
# directory, not this file's parent; an absolute path is used verbatim.
#
# roles_dir holds the role policy templates that `mint serve` / `mint seal`
# load. These are the rendered output of `mint render` (see README.md § Data
# bucket); it is generated, not committed.
roles_dir = "roles"
# data_dir = "mint_data"   # default; the keyring + sealed surface live here
#
# Each role's template is <roles_dir>/<name>.json by default (volume-ro ->
# roles/volume-ro.json); set policy_file on a role to override the name.

# The [[role]] + [[profile]] catalog in its own file, resolved against mint's
# working directory (relative) or used verbatim (absolute).
catalog_file = "catalog.toml"

# PER-DEPLOYMENT. Listener transport; `bind` and `socket` are mutually
# exclusive. UDS for the single-host shape (coordinator + mint co-resident),
# a TCP `bind` for a standalone mint:
socket = "mint_data/mint.sock"
#   bind = "127.0.0.1:8085"

[auth]
# PER-DEPLOYMENT. Discharge URL for the enroll/exchange/admin gates — the
# auth service's identity. Required.
location = "https://auth.elide.internal/v1/discharge"

[attestation]
# PER-DEPLOYMENT. Discharge URL of the attestation coordinator (coord B).
# Required: the volume roles bind a non-reserved caveat, which makes them
# attested.
location = "https://coord-b.elide.internal/v1/discharge"

[store]
# PER-DEPLOYMENT. The bucket mint administers, holding mint's own `_mint/*`
# state. Set it to the real bucket; it may be the same bucket as the volume
# data or a separate one.
bucket = "mint-admin"
# endpoint = "https://t3.storage.dev"   # default; set for non-Tigris S3
# region   = "us-east-1"                # default
