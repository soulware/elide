\* TLC model configuration for WorkerOffload.tla
\*
\* Run with:
\*   tlc specs/WorkerOffload.tla -config specs/WorkerOffload.cfg
\*
\* Or with the VS Code TLA+ extension (tlaplus.tlaplus):
\*   Cmd+Shift+P → "TLA+: Check Model"
\*
\* MAX_WRITES = 3 bounds the state space — every state-relevant
\* interleaving of Write / StartPromote / WorkerProduce / Apply /
\* Crash / Reopen is reachable at this bound.  TLC finishes in a few
\* seconds.
\*
\* Expected output: all four invariants hold in all reachable states.
\*
\* To observe the key bug the CAS protects against: change Apply in
\* the .tla file to drop the source-equality check, e.g.
\*     /\ extent_index' = worker_job.new
\* unconditionally.  TLC will produce a counterexample to
\* CasLoserSurvives and NoCorruption with trace:
\*   Write → StartPromote → Write → WorkerProduce → Apply
\* showing extent_index clobbered from the most-recent Write back to
\* the stale worker_job.new.

SPECIFICATION Spec

CONSTANTS
  MAX_WRITES = 3

INVARIANTS
  TypeOK
  NoCorruption
  NoPermanentPark
  OneInFlight

PROPERTIES
  CasLoserSurvives

\* Reopen after Crash is always enabled, but no liveness property
\* forces it to fire — the model deliberately permits "stay crashed"
\* traces.  Suppress deadlock reporting.
CHECK_DEADLOCK FALSE
