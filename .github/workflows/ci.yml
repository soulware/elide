name: ci

# Host-runner CI:
#   - host-tests: fmt, clippy, and the workspace test suite (skipping the
#     kernel-feature modules that run in ci-kernel.yml).
#   - host-proptests: the feature-gated proptest suites, which take
#     noticeably longer. A matrix fans the targets across runners so the
#     two heavyweight suites (volume_proptest, gc_proptest) run on their
#     own runners instead of serially behind the rest.
#   - attested-e2e: the cross-repo mint discharge loop.
#
# host-tests and host-proptests share a Swatinem rust-cache via
# `shared-key: rust-build`, so cold PR runs restore from the main-branch
# build cache.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: "cargo test --workspace --no-fail-fast -- --skip ublk::"

  host-proptests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    name: host-proptests (${{ matrix.name }})

    strategy:
      # Report every cell's failures — a fault in one suite must not cancel
      # the others, matching the per-run `--no-fail-fast`.
      fail-fast: false
      matrix:
        include:
          # Each cell is a single-crate `cargo test`. Keeping the crate
          # boundary per invocation stops feature unification from activating
          # `volume-invariants` on elide-core's own proptest binaries — those
          # don't exercise the coordinator-layer paths the invariant protects,
          # and the per-op disk-rebuild dominates their runtime. Named test
          # binaries (not `--tests`) keep this lane to the proptest-gated
          # targets; `--tests` would re-run the crate's regular unit +
          # integration tests under `proptest`, duplicating them across lanes.

          # volume_proptest is the elide-core long pole; it gets its own runner.
          - name: core-volume
            cmd: |
              cargo test -p elide-core --features proptest --no-fail-fast \
                --test volume_proptest

          - name: core-rest
            cmd: |
              cargo test -p elide-core --features proptest --no-fail-fast \
                --test actor_proptest \
                --test dmat_proptest \
                --test fork_proptest \
                --test multi_volume_proptest

          # The materialized reproducers and the lib suite run under the
          # runtime drift checkers (`volume-invariants`): structural drift
          # surfaces as a clean panic at the introducing call site rather than
          # an oracle mismatch many ops later. The reproducers are short
          # deterministic sequences; the lib suite covers the checker's own
          # should_panic tests and rebuilds every structural op per call. Two
          # feature sets, so two invocations in one cell.
          - name: core-invariants
            cmd: |
              cargo test -p elide-core --features proptest,volume-invariants --no-fail-fast \
                --test volume_reproducers
              cargo test -p elide-core --features volume-invariants --no-fail-fast --lib

          # `elide-coordinator/proptest` propagates `elide-core/volume-invariants`,
          # so gc_proptest runs with drift detection. gc_segment_cleanup is the
          # workflow's long pole: 256 disk-heavy cases that dominate CI's slow
          # disk, and proptest has no intra-fn parallelism. It is case-sharded
          # across two runners (PROPTEST_CASES=128 each); proptest seeds its RNG
          # from entropy per process, so the shards explore disjoint cases and
          # together approximate the original 256-case run. Dropping the
          # explicit `cases: 256` in gc_proptest.rs is what lets PROPTEST_CASES
          # take effect.
          #
          # Complete partition by name: the shard cells run every test matching
          # `gc_segment_cleanup`; `coord-gc-oracle` runs the complement via
          # `--skip gc_segment_cleanup` (gc_oracle at the full 256, the other
          # units) plus segment_head_proptest. A test added later lands in a
          # shard iff its name contains gc_segment_cleanup, else the oracle cell.
          - name: coord-gc-oracle
            cmd: |
              cargo test -p elide-coordinator --features proptest --no-fail-fast \
                --test gc_proptest --test segment_head_proptest -- --skip gc_segment_cleanup

          - name: coord-gc-cleanup-a
            cmd: |
              PROPTEST_CASES=128 cargo test -p elide-coordinator --features proptest --no-fail-fast \
                --test gc_proptest -- gc_segment_cleanup

          - name: coord-gc-cleanup-b
            cmd: |
              PROPTEST_CASES=128 cargo test -p elide-coordinator --features proptest --no-fail-fast \
                --test gc_proptest -- gc_segment_cleanup

    steps:
      - uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-build

      - name: cargo test
        run: ${{ matrix.cmd }}

  # The attested-loop e2e composes two repos: a real mint daemon (the
  # hermetic `mint-e2e` harness, from github.com/soulware/mint), the
  # coord B discharge listener, and the coordinator's enrollment +
  # assume-role client, over elide's own mint role templates (the
  # shipped deployment artifact under deploy/mint/). The test is
  # #[ignore]d (it spawns the mint binaries and binds sockets), so it
  # gets its own job that checks out and builds mint first.
  attested-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      # mint is a separate (public) repo; only its binaries are consumed
      # here. Pin `ref` to a tag/SHA to test against a known mint, not a
      # moving main.
      - name: checkout mint
        uses: actions/checkout@v6
        with:
          repository: soulware/mint
          ref: main
          path: .mint-ci

      # mint is the producer of the discharge known-answer vectors;
      # elide vendors a copy (testdata/mint-discharge-vectors.json) that
      # its coord-B reimplementation tests pin against. The two repos must
      # agree on the wire format, so fail loudly if elide's copy has
      # drifted from the pinned mint's — regenerate in mint
      # (MINT_EMIT_VECTORS=1), copy it here, and re-verify the reimpl.
      - name: discharge vectors in sync with mint
        run: |
          diff -u testdata/mint-discharge-vectors.json \
                  .mint-ci/testdata/mint-discharge-vectors.json \
            || { echo "::error::elide's discharge vectors have drifted from mint@main"; exit 1; }

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: attested-e2e
          workspaces: |
            .
            .mint-ci

      - name: build mint bins
        working-directory: .mint-ci
        run: cargo build --bin mint --features e2e-harness --bin mint-e2e

      - name: attested-loop e2e
        env:
          MINT_BIN: ${{ github.workspace }}/.mint-ci/target/debug/mint
          MINT_E2E_BIN: ${{ github.workspace }}/.mint-ci/target/debug/mint-e2e
        run: |
          cargo test -p elide-coordinator --bin elide-coordinator -- \
            --ignored attested_loop
